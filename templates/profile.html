{% extends "base.html" %}
{% block title %}프로필{% endblock %}
{% block content %}
<h2>프로필 관리</h2>
<p>사용자명: {{ user.username }}</p>
<p>잔액: {{ '{:,}'.format(user.balance) }}원</p>

<h3>소개글 수정</h3>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="form_type" value="bio">
  <textarea name="bio" rows="4" cols="50" maxlength="500">{{ user.bio or '' }}</textarea><br>
  <button type="submit">소개글 업데이트</button>
</form>

<h3>비밀번호 변경</h3>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="form_type" value="password">
  현재 비밀번호: <input type="password" name="current_password" required><br>
  새 비밀번호 (8자 이상, 영문+숫자 포함): <input type="password" name="new_password" minlength="8" maxlength="72" required><br>
  <button type="submit">비밀번호 변경</button>
</form>
{% endblock %}
