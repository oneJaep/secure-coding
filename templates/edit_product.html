{% extends "base.html" %}
{% block title %}상품 수정{% endblock %}
{% block content %}
<h2>상품 수정</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  제목: <input type="text" name="title" value="{{ product.title }}" maxlength="200" required><br>
  설명: <br>
  <textarea name="description" rows="4" cols="50" maxlength="2000" required>{{ product.description }}</textarea><br>
  가격 (원): <input type="number" name="price" value="{{ product.price }}" min="1" max="100000000" required><br>
  <button type="submit">수정하기</button>
</form>
{% endblock %}
