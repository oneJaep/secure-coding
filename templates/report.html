{% extends "base.html" %}
{% block title %}신고하기{% endblock %}
{% block content %}
<h2>신고하기</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  신고 대상 유형:
  <select name="target_type" required>
    <option value="product" {{ 'selected' if target_type == 'product' else '' }}>상품</option>
    <option value="user" {{ 'selected' if target_type == 'user' else '' }}>사용자</option>
  </select><br>
  신고 대상 ID (사용자ID 또는 상품ID): <input type="text" name="target_id" value="{{ target_id }}" required><br>
  신고 사유: <br>
  <textarea name="reason" rows="4" cols="50" maxlength="500" required></textarea><br>
  <button type="submit">신고 접수</button>
</form>
{% endblock %}
